syntax = "proto3";

package user;

option java_multiple_files = true;
option java_package = "com.bravos.recruitment.proto.user";
option java_outer_classname = "UserProto";

message GetInternalUserInfoRequest {
  oneof identifier {
    int64 id = 1;
    string username = 2;
    string email = 3;
  }
  string userType = 4; // CANDIDATE, STAFF
}

message GetInternalUserInfoResponse {
  int64 id = 1;
  string username = 2;
  string email = 3;
  string firstName = 4;
  string lastName = 5;
  bool enabled = 6;
  int64 createdAt = 7;
  bool found = 8;
  string message = 9;
}

message GetUserPermissionsRequest {
  string username = 1;
  string userType = 2; // CANDIDATE, STAFF
}

message GetUserPermissionsResponse {
  // Set semantics are represented as a repeated field in proto3.
  repeated string permissions = 1;
}

service InternalUserInfoService {
  rpc GetInternalUserInfo(GetInternalUserInfoRequest) returns (GetInternalUserInfoResponse);
  rpc GetUserPermissions(GetUserPermissionsRequest) returns (GetUserPermissionsResponse);
}